services:
  db:
    image: postgis/postgis:16-3.4
    container_name: db
    hostname: db
    command: ["postgres", "-c", "log_min_messages=error"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fdr_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - fdr_network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - fdr_network

  web:
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_ISSUER=http://localhost:8080
      - KEYCLOAK_REALM=fdr
      - KEYCLOAK_CLIENT_ID=fdr-etl
      - SUPERSET_INTERNAL_URL=http://superset:8088
      - SUPERSET_SERVICE_USERNAME=${SUPERSET_SERVICE_USERNAME}
      - SUPERSET_SERVICE_PASSWORD=${SUPERSET_SERVICE_PASSWORD}
    ports:
      - "8000:5000"
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      - db
      - redis
      - keycloak
    command: ["uvicorn", "fdr_etl.web.app:app", "--host", "0.0.0.0", "--port", "5000"]
    restart: unless-stopped
    networks:
      - fdr_network

  worker:
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - C_FORCE_ROOT=true
    networks:
      - fdr_network
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "fdr_etl.worker.app.celery_app", "worker", "--loglevel=info"]
    restart: unless-stopped

  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: superset
    user: root
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_CONFIG_PATH=/app/pythonpath/superset_config.py
      - SUPERSET_FEATURE_EMBEDDED_DASHBOARD=true
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=postgresql://postgres:postgres@db:5432/fdr_db
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fdr_db
      - KEYCLOAK_SUPERSET_INTERNAL_URL=${KEYCLOAK_SUPERSET_INTERNAL_URL}
      - KEYCLOAK_SUPERSET_CLIENT_ID=${KEYCLOAK_SUPERSET_CLIENT_ID}
      - KEYCLOAK_SUPERSET_SECRET=${KEYCLOAK_SUPERSET_SECRET}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER}
    depends_on:
      - db
    networks:
      - fdr_network
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    extra_hosts:
      - "kc-host:host-gateway"

networks:
  fdr_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  superset_home: