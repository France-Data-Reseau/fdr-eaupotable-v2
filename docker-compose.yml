services:
  db:
    image: postgis/postgis:16-3.4
    command: ["postgres", "-c", "log_min_messages=error"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fdr_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - fdr_network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - fdr_network

  web:
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_ISSUER=http://localhost:8080
      - KEYCLOAK_REALM=fdr
      - KEYCLOAK_CLIENT_ID=fdr-etl
      - SUPERSET_INTERNAL_URL=http://superset:8088
      - SUPERSET_SERVICE_USERNAME=${SUPERSET_SERVICE_USERNAME}
      - SUPERSET_SERVICE_PASSWORD=${SUPERSET_SERVICE_PASSWORD}
    ports:
      - "8000:5000"
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - fdr_network

  worker:
    build: .
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - C_FORCE_ROOT=true
    networks:
      - fdr_network
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "fdr_etl.worker.app.celery_app", "worker", "--loglevel=info"]
    restart: unless-stopped


networks:
  fdr_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: