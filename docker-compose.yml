services:
  db:
    image: postgis/postgis:16-3.4
    command: ["postgres", "-c", "log_min_messages=error"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fdr_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - fdr_network

  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - fdr_network

  web:
    image: ghcr.io/france-data-reseau/fdr-eaupotable-v2:${FDR_APP_TAG:-1.0.0}
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE}
      - OIDC_BASE_URI=${OIDC_BASE_URI}
      - OIDC_CACHE_TTL=${OIDC_CACHE_TTL}
    ports:
      - "8000:5000"
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - fdr_network

  worker:
    image: ghcr.io/france-data-reseau/fdr-eaupotable-v2:${FDR_APP_TAG:-1.0.0}
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - C_FORCE_ROOT=true
    networks:
      - fdr_network
    volumes:
      - uploads_data:/tmp/uploads
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "fdr_etl.worker.app.celery_app", "worker", "--loglevel=info"]
    restart: unless-stopped


networks:
  fdr_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: