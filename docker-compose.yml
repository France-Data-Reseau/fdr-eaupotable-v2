services:
  db:
    image: postgis/postgis:16-3.4
    entrypoint: ["bash", "/docker/postgres/prestart-postgres.sh"]
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fdr_db}
      POSTGRES_READONLY_USER: ${POSTGRES_READONLY_USER:-fdr_readonly}
      POSTGRES_READONLY_PASSWORD: ${POSTGRES_READONLY_PASSWORD:-fdr_readonly_change_me}
      POSTGRES_READONLY_DB: ${POSTGRES_READONLY_DB:-${POSTGRES_DB:-fdr_db}}
      POSTGRES_TLS_CN: ${POSTGRES_TLS_CN:-db}
      POSTGRES_TLS_DAYS: ${POSTGRES_TLS_DAYS:-3650}
    volumes:
      - ./docker/postgres/prestart-postgres.sh:/docker/postgres/prestart-postgres.sh:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - fdr_network

  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    networks:
      - fdr_network

  web:
    image: ghcr.io/france-data-reseau/fdr-eaupotable-v2:${FDR_APP_TAG:-1.0.0}
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE}
      - OIDC_BASE_URI=${OIDC_BASE_URI}
      - OIDC_CACHE_TTL=${OIDC_CACHE_TTL}
    ports:
      - "8000:5000"
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - fdr_network

  worker:
    image: ghcr.io/france-data-reseau/fdr-eaupotable-v2:${FDR_APP_TAG:-1.0.0}
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - C_FORCE_ROOT=true
    networks:
      - fdr_network
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "fdr_etl.worker.app.celery_app", "worker", "--loglevel=info"]
    restart: unless-stopped


networks:
  fdr_network:
    driver: bridge